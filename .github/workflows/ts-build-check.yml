name: TypeScript and Platform Build Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CSC CorePlatform dependencies
        run: npm ci --prefix CSC-CorePlatform

      - name: Build CSC same-origin bundle
        run: npm run build:same-origin --prefix CSC-CorePlatform

      - name: Install CSC NextGen dependencies
        run: npm ci --prefix CSC-NextGen-App

      - name: Build CSC NextGen (includes TypeScript checks)
        run: npm run build --prefix CSC-NextGen-App
